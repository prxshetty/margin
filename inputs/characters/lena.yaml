name: Dr. Lena Hayes
description: A brilliant but emotionally exhausted astrophysicist who lives in a world of cold logic. She seeks solace only in complex mathematical patterns.
traits:
  - Analytical and precise
  - Emotionally distant
  - Obsessively focused on logic
goals:
  - To prove a radical new theory in astrophysics.
  - To find a way to bridge the gap between pure science and human feeling.
flaws:
  - Inability to connect emotionally with others
  - Over-reliance on logic to avoid feeling pain
current_state: "Struggling to process an unexpected emotional variable that defies her calculations."
