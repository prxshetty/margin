description: "Blueprint skeleton — acts and scenes without scene_events"
fields:
  scene_number:
    type: int
    required: true
    description: "Scene number within the act"
  scene_setting:
    type: str
    required: true
    description: "Short canonical location and optional time tag (e.g. 'kitchen — morning', 'gym — afternoon', 'police station — night'). No atmosphere, no detail"
  characters:
    type: list[str]
    required: true
    description: "Characters present in this scene"
  scene_description:
    type: str
    required: true
    description: "Cover ALL key events and plot developments from the chapter outline that happen in this scene. Focus on what characters DO and what dramatic beats occur. Also note how this scene connects to the previous one."
